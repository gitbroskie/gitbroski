name: Publish Gitbroski CLI to npm

on:
  workflow_run:
    workflows: ["Go Release"]
    types:
      - completed

permissions:
  id-token: write
  contents: read


jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=amd64 go build -o bin/gitbroski-linux ./cmd
          GOOS=darwin GOARCH=amd64 go build -o bin/gitbroski-intel-darwin ./cmd
          GOOS=darwin GOARCH=arm64 go build -o bin/gitbroski-darwin ./cmd
          GOOS=windows GOARCH=amd64 go build -o bin/gitbroski-windows.exe ./cmd

      - name: Make executables
        run: chmod +x bin/*

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
    
      - name: Ensure latest npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access public
